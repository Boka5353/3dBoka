<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Administratora - Blue Kiwi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 20px; color: #1e2d42; margin: 0; }
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; max-width: 1300px; margin: 0 auto; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin-top: 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; font-size: 18px; }
        
        /* Formularz */
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 12px; }
        .form-group input, .form-group textarea { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; }
        .btn-add { background: #22c55e; color: white; border: none; padding: 10px; width: 100%; font-weight: bold; border-radius: 4px; cursor: pointer; }

        /* Zamówienia */
        .order-card { background: white; border: 1px solid #cbd5e1; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .order-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 10px; }
        .order-id { font-size: 16px; font-weight: bold; }
        .order-date { font-size: 11px; color: #64748b; }
        
        .customer-info { font-size: 13px; background: #f8fafc; padding: 10px; border-radius: 6px; margin-bottom: 10px; }
        .customer-info p { margin: 3px 0; }
        
        .items-list { font-size: 13px; margin: 10px 0; padding-left: 20px; }
        
        .status-btn { border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .status-waiting { background: #fff3bf; color: #e67e22; }
        .status-paid { background: #d3f9d8; color: #2b8a3e; }
        .status-sent { background: #e7f5ff; color: #1c7ed6; }
        
        .product-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; padding: 8px 0; font-size: 13px; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 3px 8px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div style="max-width: 1300px; margin: 0 auto 15px auto;">
        <h1 style="margin: 0; font-size: 24px;">📊 Panel Zarządzania Blue Kiwi</h1>
    </div>

    <div class="grid">
        <!-- LEWA STRONA: MAGAZYN I ASORTYMENT -->
        <div>
            <div class="box">
                <h2>➕ Nowy Produkt</h2>
                <div class="form-group">
                    <label>Nazwa Produktu</label>
                    <input type="text" id="new-name" placeholder="np. Smok z ruchomym ogonem">
                </div>
                <div class="form-group">
                    <label>Opis</label>
                    <textarea id="new-desc" rows="2" placeholder="Krótki opis..."></textarea>
                </div>
                <div class="form-group">
                    <label>Cena (zł)</label>
                    <input type="number" step="0.01" id="new-price" placeholder="26.00">
                </div>
                <div class="form-group">
                    <label>Magazyn (szt.)</label>
                    <input type="number" id="new-stock" placeholder="10">
                </div>
                <div class="form-group">
                    <label>Adres URL Zdjęcia</label>
                    <input type="text" id="new-img" placeholder="Wklej link do obrazka (np. na ibb.co)">
                </div>
                <button class="btn-add" onclick="addNewProduct()">Dodaj do Sklepu</button>
            </div>

            <div class="box">
                <h2>📦 Stan Magazynu</h2>
                <div id="admin-products-list"></div>
            </div>
        </div>

        <!-- PRAWA STRONA: ZLECENIA KLIENTÓW -->
        <div>
            <div class="box">
                <h2>🛒 Zamówienia i Wysyłki</h2>
                <div id="admin-orders-list">
                    <!-- Zamówienia lądują tutaj -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // MAGAZYN
        function loadAdminProducts() {
            let products = JSON.parse(localStorage.getItem('products')) || [];
            let list = document.getElementById('admin-products-list');
            list.innerHTML = "";
            products.forEach((p, idx) => {
                list.innerHTML += `
                    <div class="product-item">
                        <div>
                            <strong>${p.name}</strong> - ${p.price.toFixed(2)} zł (Magazyn: <b>${p.stock} szt.</b>)
                        </div>
                        <button class="btn-delete" onclick="deleteProduct(${idx})">Usuń</button>
                    </div>
                `;
            });
        }

        function addNewProduct() {
            let name = document.getElementById('new-name').value;
            let desc = document.getElementById('new-desc').value;
            let price = parseFloat(document.getElementById('new-price').value);
            let stock = parseInt(document.getElementById('new-stock').value);
            let img = document.getElementById('new-img').value || "https://images.unsplash.com/photo-1531403009284-440f080d1e12?w=300";

            if (!name || isNaN(price) || isNaN(stock)) {
                return alert("Uzupełnij wymagane pola!");
            }

            let products = JSON.parse(localStorage.getItem('products')) || [];
            products.push({
                id: Date.now(),
                name: name,
                desc: desc,
                price: price,
                stock: stock,
                img: img
            });

            localStorage.setItem('products', JSON.stringify(products));
            
            document.getElementById('new-name').value = "";
            document.getElementById('new-desc').value = "";
            document.getElementById('new-price').value = "";
            document.getElementById('new-stock').value = "";
            document.getElementById('new-img').value = "";

            loadAdminProducts();
        }

        function deleteProduct(index) {
            if (confirm("Usunąć ten produkt?")) {
                let products = JSON.parse(localStorage.getItem('products'));
                products.splice(index, 1);
                localStorage.setItem('products', JSON.stringify(products));
                loadAdminProducts();
            }
        }

        // ZAMÓWIENIA
        function loadAdminOrders() {
            let orders = JSON.parse(localStorage.getItem('allOrders')) || [];
            let list = document.getElementById('admin-orders-list');
            list.innerHTML = "";

            if (orders.length === 0) {
                list.innerHTML = "<p style='color:#94a3b8; text-align:center;'>Brak nowych zamówień.</p>";
                return;
            }

            orders.slice().reverse().forEach((order, reverseIdx) => {
                let originalIdx = orders.length - 1 - reverseIdx;

                // Spis przedmiotów
                let itemsHtml = "";
                order.items.forEach(item => {
                    itemsHtml += `<li><strong>${item.name}</strong> — ${item.qty} szt. (z ceny: ${item.priceEach.toFixed(2)} zł)</li>`;
                });

                // Klasy kolorystyczne statusów
                let btnClass = "status-waiting";
                if (order.status === "Opłacone (Szykuj paczkę)") btnClass = "status-paid";
                if (order.status === "Wysłane") btnClass = "status-sent";

                // Informacje o kliencie
                let customerHtml = `
                    <div class="customer-info">
                        <p>👤 <strong>Klient:</strong> ${order.customer.name} ${order.customer.company ? `(${order.customer.company})` : ""}</p>
                        <p>📍 <strong>Adres:</strong> ${order.customer.address}</p>
                        <p>📞 <strong>Telefon:</strong> ${order.customer.phone} | ✉️ <strong>Email:</strong> ${order.customer.email}</p>
                        ${order.customer.notes ? `<p style="background:#fff3bf; padding:5px; margin-top:5px; border-radius:4px;">💬 <strong>Uwagi:</strong> ${order.customer.notes}</p>` : ""}
                    </div>
                `;

                list.innerHTML += `
                    <div class="order-card">
                        <div class="order-header">
                            <span class="order-id">Zamówienie #${order.id}</span>
                            <span class="order-date">${order.date || ''}</span>
                        </div>
                        
                        ${customerHtml}

                        <div style="font-size:13px; margin-bottom:10px;">
                            🚚 <strong>Metoda dostawy:</strong> ${order.shipping}
                        </div>

                        <strong>Zakupy:</strong>
                        <ul class="items-list">${itemsHtml}</ul>

                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px; border-top:1px solid #f1f5f9; padding-top:10px;">
                            <div>Do zapłaty: <strong style="font-size:16px;">${order.total}</strong></div>
                            <button class="status-btn ${btnClass}" onclick="cycleStatus(${originalIdx})">
                                ${order.status}
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function cycleStatus(index) {
            let orders = JSON.parse(localStorage.getItem('allOrders'));
            let current = orders[index].status;
            
            if (current === "Oczekuje na BLIK") {
                orders[index].status = "Opłacone (Szykuj paczkę)";
            } else if (current === "Opłacone (Szykuj paczkę)") {
                orders[index].status = "Wysłane";
            } else {
                orders[index].status = "Oczekuje na BLIK";
            }
            
            localStorage.setItem('allOrders', JSON.stringify(orders));
            loadAdminOrders();
        }

        window.addEventListener('storage', () => {
            loadAdminProducts();
            loadAdminOrders();
        });

        loadAdminProducts();
        loadAdminOrders();
    </script>
</body>
</html>
